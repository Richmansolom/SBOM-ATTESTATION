stages:
  - build

variables:
  SBOM_DIR: "sbom"
  REPORT_DIR: "reports"
  BUILD_LOG: "build-output.log"
  APP_DIR: "example-app"

build_sbom_scan:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache bash curl jq python3 openssl build-base
    - mkdir -p "$SBOM_DIR" "$REPORT_DIR" "$APP_DIR/build"
  script:
    - echo "==> Build example C++ application"
    - make -C $APP_DIR 2>&1 | tee "$REPORT_DIR/$BUILD_LOG"
    - echo "==> Generate COTS SBOMs (Syft + Trivy + Distro2SBOM)"
    - docker pull anchore/syft:latest
    - docker pull aquasec/trivy:latest
    - docker pull cyclonedx/cyclonedx-cli:latest
    - docker pull python:3.12-slim
    - docker run --rm -v "$CI_PROJECT_DIR:/src" anchore/syft:latest dir:/src/$APP_DIR -o cyclonedx-json > "$SBOM_DIR/sbom-source-syft.json"
    - docker run --rm -v "$CI_PROJECT_DIR:/src" anchore/syft:latest dir:/src/$APP_DIR/build -o cyclonedx-json > "$SBOM_DIR/sbom-build-syft.json"
    - docker run --rm -v "$CI_PROJECT_DIR:/src" -v "$CI_PROJECT_DIR:/work" aquasec/trivy:latest filesystem --format cyclonedx --output "/work/$SBOM_DIR/sbom-source-trivy.json" /src/$APP_DIR
    - docker run --rm -v "$CI_PROJECT_DIR:/src" -v "$CI_PROJECT_DIR:/work" aquasec/trivy:latest filesystem --format cyclonedx --output "/work/$SBOM_DIR/sbom-build-trivy.json" /src/$APP_DIR/build
    - docker run --rm -v "$CI_PROJECT_DIR:/work" python:3.12-slim bash -lc "pip install --no-cache-dir distro2sbom >/dev/null && python -m distro2sbom.cli --distro auto --system --sbom cyclonedx --format json --product-type operating-system --product-name sbom-runtime --product-version 1.0 --output-file /work/$SBOM_DIR/sbom-distro2sbom.json"
    - docker run --rm -v "$CI_PROJECT_DIR:/data" cyclonedx/cyclonedx-cli:latest merge --input-files "/data/$SBOM_DIR/sbom-source-syft.json" "/data/$SBOM_DIR/sbom-source-trivy.json" "/data/$SBOM_DIR/sbom-distro2sbom.json" --output-file "/data/$SBOM_DIR/sbom-source.json" --output-format json
    - docker run --rm -v "$CI_PROJECT_DIR:/data" cyclonedx/cyclonedx-cli:latest merge --input-files "/data/$SBOM_DIR/sbom-build-syft.json" "/data/$SBOM_DIR/sbom-build-trivy.json" "/data/$SBOM_DIR/sbom-distro2sbom.json" --output-file "/data/$SBOM_DIR/sbom-build.json" --output-format json
    - echo "==> Enrich SBOMs with custom application metadata"
    - docker pull mcr.microsoft.com/powershell:7.4-ubuntu-22.04
    - >
      docker run --rm -v "$CI_PROJECT_DIR:/work" -w /work mcr.microsoft.com/powershell:7.4-ubuntu-22.04
      pwsh -File merge-sbom.ps1
      -InputSbom "$SBOM_DIR/sbom-source.json"
      -AppMetadata "$APP_DIR/app-metadata.json"
      -OutputSbom "$SBOM_DIR/sbom-source.enriched.json"
    - >
      docker run --rm -v "$CI_PROJECT_DIR:/work" -w /work mcr.microsoft.com/powershell:7.4-ubuntu-22.04
      pwsh -File merge-sbom.ps1
      -InputSbom "$SBOM_DIR/sbom-build.json"
      -AppMetadata "$APP_DIR/app-metadata.json"
      -OutputSbom "$SBOM_DIR/sbom-build.enriched.json"
    - echo "==> Validate SBOM structure (CycloneDX-CLI) and NTIA - before signing"
    - docker pull cyclonedx/cyclonedx-cli:latest
    - docker pull hoppr/hopctl:latest
    - |
      set +e
      docker run --rm -v "$CI_PROJECT_DIR:/data" cyclonedx/cyclonedx-cli:latest validate --input-file "/data/$SBOM_DIR/sbom-source.enriched.json"
      raw_validate=$?
      docker run --rm -v "$CI_PROJECT_DIR:/data" cyclonedx/cyclonedx-cli:latest validate --input-file "/data/$SBOM_DIR/sbom-build.enriched.json"
      enriched_validate=$?

      docker run --rm -v "$CI_PROJECT_DIR:/work" -w /work mcr.microsoft.com/powershell:7.4-ubuntu-22.04 pwsh -File ./check-ntia.ps1 -SbomFile "$SBOM_DIR/sbom-source.enriched.json"
      ntia_local=$?

      docker run --rm -v "$CI_PROJECT_DIR:/data" -w /data hoppr/hopctl validate sbom --sbom "$SBOM_DIR/sbom-source.enriched.json" --profile ntia --log "/data/$REPORT_DIR/hoppr-source.log" --output-file "/data/$REPORT_DIR/hoppr-source-results.json" --basic-term 2>&1 | tee "$REPORT_DIR/hoppr-source-console.txt"
      hoppr_source=$?
      docker run --rm -v "$CI_PROJECT_DIR:/data" -w /data hoppr/hopctl validate sbom --sbom "$SBOM_DIR/sbom-build.enriched.json" --profile ntia --log "/data/$REPORT_DIR/hoppr-build.log" --output-file "/data/$REPORT_DIR/hoppr-build-results.json" --basic-term 2>&1 | tee "$REPORT_DIR/hoppr-build-console.txt"
      hoppr_build=$?
      set -e

      {
        echo "SBOM Requirements Summary"
        echo "========================="
        echo "CycloneDX validate (source):      $([ $raw_validate -eq 0 ] && echo PASS || echo FAIL)"
        echo "CycloneDX validate (build):      $([ $enriched_validate -eq 0 ] && echo PASS || echo FAIL)"
        echo "NTIA Minimum Elements (local):   $([ $ntia_local -eq 0 ] && echo PASS || echo FAIL)"
        echo "Hoppr NTIA (source):             $([ $hoppr_source -eq 0 ] && echo PASS || echo WARN)"
        echo "Hoppr NTIA (build):             $([ $hoppr_build -eq 0 ] && echo PASS || echo WARN)"
        echo ""
        echo "========== Hoppr Source Log (dependencies present/missing) =========="
        cat "$REPORT_DIR/hoppr-source.log" 2>/dev/null || echo "(no log file)"
        echo ""
        echo "========== Hoppr Build Log (dependencies present/missing) =========="
        cat "$REPORT_DIR/hoppr-build.log" 2>/dev/null || echo "(no log file)"
      } > "$REPORT_DIR/requirements-summary.txt"

      if [ $raw_validate -ne 0 ] || [ $enriched_validate -ne 0 ] || [ $ntia_local -ne 0 ]; then
        echo "SBOM requirement checks failed. See $REPORT_DIR/requirements-summary.txt"
        exit 1
      fi
    - echo "==> Sign SBOMs with embedded CycloneDX signature (PKI, RS384, CNSA 2.0)"
    - |
      set -e
      chmod +x scripts/sign-sbom.sh
      PKI_DIR="$SBOM_DIR/pki"
      cp "$SBOM_DIR/sbom-source.enriched.json" "$SBOM_DIR/sbom-source.enriched.unsigned.json"
      cp "$SBOM_DIR/sbom-build.enriched.json" "$SBOM_DIR/sbom-build.enriched.unsigned.json"
      docker run --rm -v "$CI_PROJECT_DIR:/data" cyclonedx/cyclonedx-cli:latest convert --input-file "/data/$SBOM_DIR/sbom-source.enriched.unsigned.json" --output-file "/data/$SBOM_DIR/sbom-source.enriched.unsigned.v16.json" --output-format json --output-version v1_6
      docker run --rm -v "$CI_PROJECT_DIR:/data" cyclonedx/cyclonedx-cli:latest convert --input-file "/data/$SBOM_DIR/sbom-build.enriched.unsigned.json" --output-file "/data/$SBOM_DIR/sbom-build.enriched.unsigned.v16.json" --output-format json --output-version v1_6
      bash scripts/sign-sbom.sh "$SBOM_DIR/sbom-source.enriched.json" "$SBOM_DIR/sbom-source.enriched.signed.json" "$PKI_DIR"
      mv "$SBOM_DIR/sbom-source.enriched.signed.json" "$SBOM_DIR/sbom-source.enriched.json"
      bash scripts/sign-sbom.sh "$SBOM_DIR/sbom-build.enriched.json" "$SBOM_DIR/sbom-build.enriched.signed.json" "$PKI_DIR"
      mv "$SBOM_DIR/sbom-build.enriched.signed.json" "$SBOM_DIR/sbom-build.enriched.json"
      echo "Signature embedded in SBOM - public key in $PKI_DIR/sbom_public_key.pem"
    - echo "==> SBOM vulnerability scan using Grype"
    - docker pull anchore/grype:latest
    - docker run --rm -v "$CI_PROJECT_DIR:/data" anchore/grype:latest sbom:/data/$SBOM_DIR/sbom-source.enriched.unsigned.v16.json -o json > "$REPORT_DIR/grype-report.json"
    - docker run --rm -v "$CI_PROJECT_DIR:/data" anchore/grype:latest sbom:/data/$SBOM_DIR/sbom-source.enriched.unsigned.v16.json -o table > "$REPORT_DIR/grype-report.txt"
    - echo "==> Generate vulnerability analysis report"
    - >
      jq -r '
        def count(sev): ( [ .matches[]? | select(.vulnerability.severity == sev) ] | length );
        "Vulnerability Analysis Summary",
        "==============================",
        ("Total: " + ( [ .matches[]? ] | length | tostring )),
        ("Critical: " + (count("Critical") | tostring)),
        ("High: " + (count("High") | tostring)),
        ("Medium: " + (count("Medium") | tostring)),
        ("Low: " + (count("Low") | tostring)),
        ("Negligible: " + (count("Negligible") | tostring)),
        "",
        "Top Findings (up to 10):",
        ( [ .matches[]? | "\(.vulnerability.id) | \(.vulnerability.severity) | \(.artifact.name) \(.artifact.version // "")" ][0:10] | .[] )
      ' "$REPORT_DIR/grype-report.json" > "$REPORT_DIR/vulnerability-analysis.txt"
  artifacts:
    when: always
    paths:
      - example-app/build/
      - sbom/
      - reports/
    expire_in: 1 week
