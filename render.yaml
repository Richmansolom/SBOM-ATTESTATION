services:
  - type: web
    name: sbom-control-api
    env: python
    plan: free
    buildCommand: pip install -r sbom_ui/requirements.txt
    # Single worker: Render free tier has little RAM; two workers duplicate Python memory and often OOM.
    startCommand: gunicorn --chdir sbom_ui app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: CORS_ALLOW_ORIGIN
        value: "*"
      - key: SBOM_AUTO_INSTALL_SYFT
        value: "1"
      - key: SYFT_VERSION
        value: "v1.22.0"
