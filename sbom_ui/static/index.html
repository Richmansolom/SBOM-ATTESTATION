<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>SBOM Attestation — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script id="react-cdn" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script id="react-dom-cdn" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script id="babel-cdn" src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --bg0:#0a0e14; --bg1:#0f1520; --bg2:#141c2a; --bg3:#1a2436; --bg4:#202c40;
  --gold:#f0a500; --gold2:#c9870a; --gold-dim:rgba(240,165,0,.12);
  --teal:#2dd4bf; --teal-dim:rgba(45,212,191,.12);
  --green:#22d3a2; --green-dim:rgba(34,211,162,.1);
  --red:#f43f5e; --red-dim:rgba(244,63,94,.1);
  --amber:#fb923c; --amber-dim:rgba(251,146,60,.1);
  --purple:#a78bfa; --purple-dim:rgba(167,139,250,.1);
  --text0:#e8edf5; --text1:#96a6be; --text2:#4a5a72; --text3:#2a3548;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.04);
  --mono:'IBM Plex Mono',monospace; --sans:'Manrope',sans-serif;
  --r:6px; --r2:10px; --r3:16px;
  --sh:0 8px 32px rgba(0,0,0,.5);
  --hh:54px; --tbh:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:var(--sans);background:var(--bg0);color:var(--text0);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:var(--sans);border:none;cursor:pointer;outline:none;background:none}
input,select,textarea{font-family:var(--mono);outline:none;border:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
a{color:inherit;text-decoration:none}

/* Layout */
.root{display:flex;flex-direction:column;height:100%}
.header{height:var(--hh);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:30}
.logo{width:30px;height:30px;background:var(--gold);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-txt{font-family:var(--mono);font-size:11px;font-weight:700;color:#000;letter-spacing:-.5px}
.brand{display:flex;flex-direction:column;min-width:0}
.brand-title{font-size:14px;font-weight:700;color:var(--text0);white-space:nowrap}
.brand-sub{font-size:9px;font-family:var(--mono);color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hdr-sp{flex:1}
.hdr-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-link{font-size:11px;font-family:var(--mono);color:var(--text2);padding:4px 9px;border:1px solid var(--border);border-radius:var(--r);transition:.2s;white-space:nowrap}
.hdr-link:hover{color:var(--gold);border-color:var(--gold-dim)}
.conn-pill{display:flex;align-items:center;gap:6px;padding:4px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:11px;font-family:var(--mono);color:var(--text1);cursor:pointer;transition:.2s}
.conn-pill:hover{border-color:var(--gold);color:var(--gold)}
.conn-pill.on{border-color:rgba(34,211,162,.3);color:var(--green)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.dot.pulse{animation:dpulse 2s ease-in-out infinite}
@keyframes dpulse{0%,100%{opacity:1}50%{opacity:.3}}
.shell{display:flex;flex:1;overflow:hidden}
.main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg0)}
.page{padding:clamp(14px,3vw,24px);display:flex;flex-direction:column;gap:16px;max-width:1440px}
.tabbar{display:none;height:var(--tbh);background:var(--bg1);border-top:1px solid var(--border);flex-shrink:0;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
@media(max-width:768px){.tabbar{display:flex}.sidebar{display:none}}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9.5px;font-weight:600;letter-spacing:.5px;color:var(--text2);cursor:pointer;border-top:2px solid transparent;transition:.15s}
.tab-btn.active{color:var(--gold);border-top-color:var(--gold)}
.tab-icon{font-size:17px;line-height:1}

/* Sidebar */
.sidebar{width:200px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.nav-sec{padding:14px 12px 5px;font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;color:var(--text1);font-size:12.5px;font-weight:500;transition:.15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text0);background:var(--bg2)}
.nav-item.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:9px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:1px 5px;color:var(--text2)}
.nav-badge.live{background:var(--green-dim);color:var(--green);border-color:rgba(34,211,162,.25)}
.sidebar-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.sidebar-foot-info{font-size:9px;font-family:var(--mono);color:var(--text3);line-height:1.9}

/* Cards */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--border2);gap:10px;flex-wrap:wrap}
.card-title{font-size:11px;font-weight:600;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--text1);display:flex;align-items:center;gap:6px}
.card-body{padding:16px}

/* Analyzer */
.analyzer{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;position:relative}
.analyzer::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--teal),var(--purple));opacity:.8}
.analyzer-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border2)}
.analyzer-title{font-size:clamp(18px,3vw,22px);font-weight:800;color:var(--text0);margin-bottom:4px}
.analyzer-sub{font-size:12px;font-family:var(--mono);color:var(--text2)}
.analyzer-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}
.finput{width:100%;padding:10px 14px;background:var(--bg0);border:1px solid var(--border);border-radius:var(--r);color:var(--text0);font-size:13px;font-family:var(--mono);transition:.2s}
.finput:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.finput::placeholder{color:var(--text3)}
select.finput option{background:var(--bg2)}
.meta-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(150px,100%),1fr));gap:10px}
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--bg0)}
.mode-btn{flex:1;padding:9px 8px;font-size:11px;font-family:var(--mono);font-weight:600;color:var(--text2);transition:.15s;border:none;background:none;cursor:pointer}
.mode-btn.active{background:var(--bg3);color:var(--gold)}
.scan-btn{padding:11px 28px;background:var(--gold);border-radius:var(--r);font-size:13px;font-weight:800;color:#000;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:8px;border:none;cursor:pointer}
.scan-btn:hover:not(:disabled){background:var(--gold2);color:#000}
.scan-btn:disabled{opacity:.4;cursor:not-allowed}
.scan-btn.running{background:var(--bg3);color:var(--text1);border:1px solid var(--border)}

/* Stage flow */
.stage-flow{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:2px 0}
.stage-flow::-webkit-scrollbar{display:none}
.stage-node{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.stage-box{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);font-size:9.5px;font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);white-space:nowrap;transition:.3s;min-width:76px;text-align:center}
.stage-box.active{border-color:rgba(240,165,0,.4);color:var(--gold);background:var(--gold-dim)}
.stage-box.done{border-color:rgba(34,211,162,.3);color:var(--green);background:var(--green-dim)}
.stage-box.error{border-color:rgba(244,63,94,.3);color:var(--red);background:var(--red-dim)}
.stage-box.clickable{cursor:pointer}
.stage-box.clickable:hover{border-color:rgba(45,212,191,.45);box-shadow:0 0 0 2px rgba(45,212,191,.12)}
.stage-box.selected{box-shadow:0 0 0 2px rgba(240,165,0,.18)}
.stage-arrow{color:var(--text3);font-size:12px;flex-shrink:0;margin-bottom:18px}
.stage-time{font-size:9px;font-family:var(--mono);color:var(--text3)}

/* Terminal */
.terminal{background:#050810;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.term-hd{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.term-dot{width:8px;height:8px;border-radius:50%}
.term-body{padding:12px;font-family:var(--mono);font-size:clamp(10px,1.4vw,11.5px);line-height:1.7;overflow-y:auto;max-height:220px;color:#6E7F8D}
.tl-ok{color:var(--green)}.tl-err{color:var(--red)}.tl-warn{color:var(--amber)}.tl-info{color:var(--teal)}.tl-cmd{color:var(--text0)}
.cursor{display:inline-block;width:7px;height:13px;background:var(--gold);vertical-align:middle;animation:blink .8s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.5px;white-space:nowrap}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(240,165,0,.25)}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,211,162,.2)}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(244,63,94,.2)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(251,146,60,.2)}
.badge-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.bdot{width:4px;height:4px;border-radius:50%;background:currentColor;animation:dpulse 1.5s ease-in-out infinite}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:.18s;white-space:nowrap;border:1px solid var(--border);background:var(--bg3);color:var(--text1)}
.btn:hover{border-color:var(--text2);color:var(--text0)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-gold{background:var(--gold-dim);border-color:rgba(240,165,0,.25);color:var(--gold)}
.btn-gold:hover{background:rgba(240,165,0,.2);border-color:var(--gold)}
.btn-green{background:var(--green-dim);border-color:rgba(34,211,162,.25);color:var(--green)}
.btn-red{background:var(--red-dim);border-color:rgba(244,63,94,.25);color:var(--red)}

/* Severity bars */
.sev-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
.sev-lbl{font-size:10px;font-family:var(--mono);font-weight:600;width:76px;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.sev-track{flex:1;height:22px;background:var(--bg3);border-radius:4px;overflow:hidden}
.sev-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.sev-cnt{font-size:10px;font-weight:700;color:#000;font-family:var(--mono)}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:360px}
th{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);font-family:var(--mono);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border2);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.mono{font-family:var(--mono)}

/* Modal */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(10,14,20,.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{width:100%;max-width:420px;background:var(--bg1);border:1px solid rgba(240,165,0,.2);border-radius:var(--r3);padding:clamp(20px,5vw,32px);box-shadow:0 0 60px rgba(240,165,0,.06);animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.92) translateY(12px)}to{opacity:1;transform:none}}
.modal-icon{font-size:36px;text-align:center;margin-bottom:14px}
.modal-title{font-size:20px;font-weight:800;text-align:center;color:var(--gold);margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--text2);text-align:center;margin-bottom:20px;font-family:var(--mono);line-height:1.6}
.modal-fields{display:flex;flex-direction:column;gap:12px}
.modal-err{font-size:11px;color:var(--red);background:var(--red-dim);border:1px solid rgba(244,63,94,.2);border-radius:var(--r);padding:7px 10px;font-family:var(--mono)}
.modal-note{font-size:9.5px;color:var(--text3);text-align:center;margin-top:10px;font-family:var(--mono);letter-spacing:.5px}

/* Toast */
.toast-stack{position:fixed;top:calc(var(--hh) + 12px);right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:min(340px,calc(100vw - 32px))}
.toast{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh);pointer-events:all;font-size:12px;animation:sli .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes sli{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--gold)}

/* Spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp360 .6s linear infinite;flex-shrink:0}
@keyframes sp360{to{transform:rotate(360deg)}}

/* PKI */
.pki-node{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);transition:.2s}
.pki-node:hover{border-color:rgba(240,165,0,.25);transform:translateX(3px)}
.pki-conn{width:2px;height:14px;background:linear-gradient(var(--gold),rgba(240,165,0,.1));margin-left:17px;opacity:.35}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border2);flex-wrap:wrap}
.info-row:last-child{border-bottom:none}
.info-key{font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0}
.info-val{font-size:11px;font-family:var(--mono);color:var(--text0);text-align:right;word-break:break-all}

/* Utils */
.flex{display:flex}.flex-col{display:flex;flex-direction:column}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-10{gap:10px}
.text-mono{font-family:var(--mono)}.text-muted{color:var(--text2)}
.text-gold{color:var(--gold)}.text-green{color:var(--green)}.text-red{color:var(--red)}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:14px}
.fade-in{animation:fi .25s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(28px,6vw,52px) 20px;color:var(--text3);text-align:center;gap:10px}
.empty-icon{font-size:clamp(28px,5vw,40px);opacity:.3}
.empty-msg{font-size:12.5px}
.copy-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;font-size:10px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);cursor:pointer;transition:.2s}
.copy-btn:hover{border-color:var(--gold);color:var(--gold)}
.boot-error{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.boot-error-card{width:min(680px,100%);background:var(--bg1);border:1px solid rgba(244,63,94,.35);border-radius:var(--r3);padding:20px;box-shadow:var(--sh)}
.boot-error-title{font-size:14px;font-weight:800;color:#fca5b7;margin-bottom:8px}
.boot-error-text{font-size:12px;color:var(--text1);line-height:1.55}
.boot-error-detail{margin-top:10px;font-size:11px;font-family:var(--mono);color:var(--amber);background:var(--amber-dim);border:1px solid rgba(251,146,60,.2);border-radius:var(--r);padding:8px 10px;white-space:pre-wrap}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── HELPERS ── */
const ago=d=>{if(!d)return'—';const s=Math.round((Date.now()-new Date(d))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};
const sha7=s=>s?s.slice(0,7):'';
const SEV_COL={Critical:'#f43f5e',High:'#fb923c',Medium:'#D29922',Low:'#22d3a2',Negligible:'#2a3548',Unknown:'#2a3548'};
const SEV_ORD=['Critical','High','Medium','Low','Negligible'];

function sbomApi(path,{method='GET',body=null,config=null,query={}}={}){
  const cleanPath=String(path||'').replace(/^\/+/, '');
  const params=new URLSearchParams();
  if(config&&config.provider)params.set('provider',String(config.provider));
  if(config&&config.projectId)params.set('project',String(config.projectId));
  Object.entries(query||{}).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=='')params.set(k,String(v));});
  const url='/api/'+cleanPath+(params.toString()?'?'+params.toString():'');
  const headers={};
  if(body)headers['Content-Type']='application/json';
  if(config&&config.token)headers['X-SBOM-TOKEN']=String(config.token);
  return fetch(url,{method,headers,body:body?JSON.stringify(body):undefined}).then(async r=>{
    const txt=await r.text();
    const ctype=(r.headers.get('content-type')||'').toLowerCase();
    const wantsJson=ctype.includes('application/json');
    let data=wantsJson?{}:txt;
    if(wantsJson){
      try{data=txt?JSON.parse(txt):{};}catch{data={message:txt||''};}
    }
    if(!r.ok){
      if(wantsJson)throw new Error((data&&data.message)||txt||String(r.status));
      throw new Error(txt||String(r.status));
    }
    return data;
  });
}

function toUiStageKey(stage){
  const s=String(stage||'').toLowerCase();
  if(s==='build')return'build';
  if(s==='generate'||s==='sbom_generate'||s==='sbom-generate')return'generate';
  if(s==='sign'||s==='sbom_sign'||s==='sbom-sign')return'sign';
  if(s==='scan'||s==='sbom_scan'||s==='sbom-scan')return'scan';
  if(s==='report')return'report';
  return'';
}

function stageStatusClass(status){
  const s=String(status||'').toLowerCase();
  if(['success','passed','completed'].includes(s))return'done';
  if(['failed','failure','cancelled','canceled'].includes(s))return'error';
  if(['running','in_progress','queued','pending','created'].includes(s))return'active';
  return'';
}

/* ── TOAST ── */
let _toast=null;
function Toasts(){
  const[list,setList]=useState([]);
  _toast=useCallback((msg,type)=>{type=type||'info';const id=Date.now();setList(l=>[...l,{id,msg,type}]);setTimeout(()=>setList(l=>l.filter(t=>t.id!==id)),4200);},[]);
  return React.createElement('div',{className:'toast-stack'},list.map(t=>React.createElement('div',{key:t.id,className:'toast '+t.type},React.createElement('span',null,t.type==='ok'?'✓':t.type==='err'?'⚠':'ℹ'),React.createElement('span',{style:{flex:1,color:'var(--text0)'}},t.msg))));
}
const toast=(m,t)=>{if(_toast)_toast(m,t);};

/* ── SPINNER ── */
const Spin=()=><span className="spin"/>;

/* ── CST CLOCK ── */
function CSTClock(){
  const[t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
  const cst=new Date(t.toLocaleString('en-US',{timeZone:'America/Chicago'}));
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const hh=String(cst.getHours()).padStart(2,'0');
  const mm=String(cst.getMinutes()).padStart(2,'0');
  const ss=String(cst.getSeconds()).padStart(2,'0');
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',lineHeight:1.4}}>
      <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--gold)',fontWeight:600,letterSpacing:'1px'}}>
        {hh}:{mm}:{ss} <span style={{fontSize:9,color:'var(--text2)'}}>CST</span>
      </span>
      <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text2)',letterSpacing:'.5px'}}>
        {DAYS[cst.getDay()]} · {MONTHS[cst.getMonth()]} {cst.getDate()}, {cst.getFullYear()}
      </span>
    </div>
  );
}

/* ── STATUS BADGE ── */
function Bdg({s}){
  const ok=['success','passed','completed'];
  const fail=['failed','failure'];
  const run=['running','in_progress'];
  const cls=ok.includes(s)?'badge-green':fail.includes(s)?'badge-red':run.includes(s)?'badge-gold':'badge-gray';
  const label=ok.includes(s)?'PASSED':fail.includes(s)?'FAILED':run.includes(s)?'RUNNING':(s||'—').toUpperCase();
  return(
    <span className={'badge '+cls}>
      {run.includes(s)&&<span className="bdot"/>}
      {label}
    </span>
  );
}

/* ── COPY BTN ── */
function CopyBtn({text}){
  const[c,setC]=useState(false);
  return(
    <button className={'copy-btn'+(c?' btn-green':'')} onClick={()=>{navigator.clipboard.writeText(text).then(()=>{setC(true);setTimeout(()=>setC(false),2000);});}}>
      {c?'✓ COPIED':'⎘ COPY'}
    </button>
  );
}

/* ── CONNECT MODAL ── */
function ConnectModal({onConnect,onClose,initialConfig}){
  const[provider,setProv]=useState(initialConfig&&initialConfig.provider?initialConfig.provider:'github');
  const[proj,setProj]=useState(initialConfig&&initialConfig.projectId?initialConfig.projectId:'');
  const[tok,setTok]=useState(initialConfig&&initialConfig.token?initialConfig.token:'');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  async function connect(){
    if(!proj){setErr('Project path is required');return;}
    setLoading(true);setErr('');
    try{
      await sbomApi('pipelines',{config:{provider,projectId:proj,token:tok},query:{per_page:1}});
      const cfg={provider,projectId:proj,token:tok};
      localStorage.setItem('sbom_cfg',JSON.stringify(cfg));
      onConnect(cfg);toast('Connected','ok');
    }catch(e){setErr('Failed: '+e.message);}
    setLoading(false);
  }
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-icon">🛡️</div>
        <div className="modal-title">Authenticate</div>
        <div className="modal-sub">Connect to GitHub or GitLab for<br/>live pipeline data and triggers.</div>
        <div className="modal-fields">
          <div className="field">
            <span className="flbl">Provider</span>
            <select className="finput" value={provider} onChange={e=>setProv(e.target.value)}>
              <option value="github">GitHub</option>
              <option value="gitlab">GitLab</option>
            </select>
          </div>
          <div className="field">
            <span className="flbl">Project Path</span>
            <input className="finput" value={proj} onChange={e=>setProj(e.target.value)} placeholder={provider==='gitlab'?'namespace/project':'owner/repo'} autoFocus onKeyDown={e=>{if(e.key==='Enter')connect();}}/>
          </div>
          <div className="field">
            <span className="flbl">Access Token (Optional)</span>
            <input className="finput" type="password" value={tok} onChange={e=>setTok(e.target.value)} placeholder={provider==='gitlab'?'glpat-...':'ghp_...'} onKeyDown={e=>{if(e.key==='Enter')connect();}}/>
          </div>
          {err&&<div className="modal-err">{err}</div>}
          <button onClick={connect} disabled={loading} style={{padding:'10px',background:'var(--gold)',borderRadius:'var(--r)',color:'#000',fontSize:'13px',fontWeight:'800',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',border:'none',cursor:'pointer',opacity:loading?0.5:1}}>
            {loading?<><Spin/> Connecting…</>:'⚡ Connect'}
          </button>
        </div>
        <div className="modal-note">Uses backend token fallback when available · Saved locally in this browser</div>
      </div>
    </div>
  );
}

/* ── STAGE FLOW ── */
function StageFlow({current,done,errors,stageJobs,selectedStage,onStageClick,showHint}){
  done=done||[];errors=errors||[];
  const items=[{k:'build',i:'🔨',l:'Build'},{k:'generate',i:'📄',l:'Generate'},{k:'sign',i:'✍️',l:'Sign'},{k:'scan',i:'🔍',l:'Scan'},{k:'report',i:'📦',l:'Report'}];
  function cls(k){
    if(stageJobs&&stageJobs[k]){
      const mapped=stageStatusClass(stageJobs[k].status);
      if(mapped)return mapped;
    }
    if(errors.includes(k))return'error';
    if(done.includes(k))return'done';
    if(current===k)return'active';
    return'';
  }
  return(
    <>
      <div className="stage-flow">
        {items.map((s,i)=>{
          const info=stageJobs&&stageJobs[s.k]?stageJobs[s.k]:null;
         const clickable = !!onStageClick;
          return(
            <React.Fragment key={s.k}>
              {i>0&&<div className="stage-arrow">→</div>}
              <div className="stage-node">
                <div
                  className={'stage-box '+cls(s.k)+(clickable?' clickable':'')+(selectedStage===s.k?' selected':'')}
                  role={clickable?'button':undefined}
                  tabIndex={clickable?0:undefined}
                  onClick={clickable?()=>onStageClick(s.k):undefined}
                  onKeyDown={clickable?(e=>{if(e.key==='Enter'||e.key===' ')onStageClick(s.k);}):undefined}
                  title={clickable?'Click to view stage logs':'No logs for this stage'}
                >{s.i} {s.l}</div>
                <div className="stage-time">{done.includes(s.k)?'✓':current===s.k?'running…':''}</div>
              </div>
            </React.Fragment>
          );
        })}
      </div>
      {showHint&&<div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)',marginTop:8}}>Tip: click a stage to view logs without leaving this page.</div>}
    </>
  );
}

function AnalyzePage(){
  const[repoUrl,setRepoUrl]=useState('');
  const[appName,setAppName]=useState('');
  const[appVer,setAppVer]=useState('1.0.0');
  const[supplier,setSupplier]=useState('');
  const[mode,setMode]=useState('container');
  const[status,setStatus]=useState('idle');
  const[currentStage,setCurrentStage]=useState('');
  const[doneStages,setDoneStages]=useState([]);
  const[logs,setLogs]=useState([]);
  const[sbomResult,setSbomResult]=useState(null);
  const[vulnResult,setVulnResult]=useState(null);
  const[sevFilter,setSevFilter]=useState('All');
  const[compSearch,setCompSearch]=useState('');
  const[tab,setTab]=useState('components');
  const logRef=useRef(null);

  function pickPreset(v){
    setRepoUrl(v);
    if(v){
      const name=v.split('/').pop().replace(/[-_]/g,' ');
      setAppName(name);
    }
  }

  function addLog(line,type){
    type=type||'info';
    setLogs(l=>[...l,{line,type}]);
    setTimeout(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},40);
  }

  async function runScan(){
    if(!repoUrl){toast('Enter a repository URL first','err');return;}
    setStatus('running');setDoneStages([]);setCurrentStage('');setLogs([]);
    setSbomResult(null);setVulnResult(null);setTab('components');

    const STAGE_LOGS={
      build:[
        '$ git clone '+repoUrl+' target-app',
        'Cloning repository...',
        '$ cd target-app && make -j$(nproc)',
        'g++ -std=c++17 -O2 -c src/main.cpp',
        'g++ -std=c++17 -O2 -c src/data_manager.cpp',
        'Linking... done',
        '✓ Build successful'
      ],
      generate:[
        '$ syft dir:. -o cyclonedx-json > sbom/syft-raw.json',
        'Scanning filesystem...',
        '$ distro2sbom --distro-type ubuntu > sbom/distro.json',
        '$ python3 merge-sbom.py --enrich app-metadata.json',
        'Merging SBOM sources...',
        'Patching specVersion 1.7 → 1.4',
        'cyclonedx validate → SCHEMA VALID',
        'hoppr validate → NTIA MINIMUM ELEMENTS: PASSED',
        '✓ holistic-sbom.json generated'
      ],
      sign:[
        '$ cyclonedx convert holistic-sbom.json → holistic-sbom.xml',
        '$ cyclonedx sign bom --key-file $SIGNING_KEY',
        '$ cyclonedx verify all holistic-sbom-signed.xml',
        '✓ All signatures verified'
      ],
      scan:[
        '$ grype sbom:sbom/holistic-sbom.json -o json',
        'Loading vulnerability DB...',
        '$ trivy sbom sbom/holistic-sbom.json --format json',
        'Capturing DB freshness evidence...',
        '✓ Scan complete'
      ],
      report:[
        '$ python3 vuln_summary.py --input grype-report.json',
        'Generating vulnerability analysis report...',
        'Archiving artifacts...',
        '✓ Pipeline complete'
      ]
    };

    const stages=['build','generate','sign','scan','report'];
    for(let i=0;i<stages.length;i++){
      const stage=stages[i];
      setCurrentStage(stage);
      addLog('\n[STAGE '+(i+1)+'/5] '+stage.toUpperCase(),'cmd');
      for(const line of STAGE_LOGS[stage]){
        await new Promise(r=>setTimeout(r,300+Math.random()*250));
        const type=line.startsWith('✓')?'ok':line.startsWith('$')?'cmd':line.toLowerCase().includes('error')?'err':'info';
        addLog(line,type);
      }
      await new Promise(r=>setTimeout(r,350));
      setDoneStages(d=>[...d,stage]);
    }

    // Generate mock SBOM components
    const compCount=Math.floor(Math.random()*8)+10;
    const NAMES=['main-app','data-manager','sensor-adapter','comms-layer','utils','config-parser','crypto-module','logger','network-stack','memory-pool','scheduler','hal-driver','diagnostics','telemetry'];
    const TYPES=['application','library','framework'];
    const LICENSES=['MIT','Apache-2.0','BSD-2-Clause','LGPL-2.1','GPL-3.0'];
    const SOURCES=['app-metadata.json','Syft scan','Distro2SBOM'];
    const components=Array.from({length:compCount},(_,i)=>({
      name:NAMES[i%NAMES.length],
      version:(Math.floor(Math.random()*3)+1)+'.'+(Math.floor(Math.random()*10))+'.'+(Math.floor(Math.random()*5)),
      type:TYPES[Math.floor(Math.random()*TYPES.length)],
      license:LICENSES[Math.floor(Math.random()*LICENSES.length)],
      source:SOURCES[Math.floor(Math.random()*SOURCES.length)]
    }));
    setSbomResult({components,timestamp:new Date().toISOString(),target:repoUrl});

    // Generate mock CVEs (realistic ones for C/C++ apps)
    const REAL_CVES=[
      {id:'CVE-2023-44487',sev:'High',comp:'nghttp2',ver:'1.50.0',fix:'1.57.0',desc:'HTTP/2 Rapid Reset DoS attack'},
      {id:'CVE-2023-38408',sev:'Critical',comp:'openssh',ver:'9.2p1',fix:'9.3p2',desc:'Remote code execution via ssh-agent'},
      {id:'CVE-2022-42916',sev:'High',comp:'curl',ver:'7.85.0',fix:'7.86.0',desc:'HSTS bypass via IDN redirect'},
      {id:'CVE-2023-45853',sev:'Critical',comp:'zlib',ver:'1.2.13',fix:'1.3',desc:'Integer overflow in MiniZip'},
      {id:'CVE-2021-3711',sev:'Critical',comp:'openssl',ver:'1.1.1l',fix:'1.1.1m',desc:'SM2 decryption buffer overflow'},
      {id:'CVE-2023-2650',sev:'High',comp:'openssl',ver:'3.0.8',fix:'3.0.9',desc:'ASN.1 object identifier DoS'},
      {id:'CVE-2023-29469',sev:'Medium',comp:'libxml2',ver:'2.10.3',fix:'2.11.0',desc:'Use-after-free in dict strings'},
      {id:'CVE-2023-1916',sev:'Medium',comp:'libtiff',ver:'4.5.0',fix:'4.5.1',desc:'Out-of-bounds read in tiffcrop'},
      {id:'CVE-2023-0361',sev:'Low',comp:'gnutls',ver:'3.7.9',fix:'3.8.0',desc:'RSA-PSK timing side-channel'},
    ];
    const crit=Math.random()<0.35?Math.floor(Math.random()*2):0;
    const high=Math.floor(Math.random()*3);
    const med=Math.floor(Math.random()*4);
    const low=Math.floor(Math.random()*4);
    const shuffled=[...REAL_CVES].sort(()=>Math.random()-.5);
    const matches=[];
    let idx=0;
    for(let k=0;k<crit&&idx<shuffled.length;k++,idx++)matches.push({...shuffled[idx],sev:'Critical'});
    for(let k=0;k<high&&idx<shuffled.length;k++,idx++)matches.push({...shuffled[idx],sev:'High'});
    for(let k=0;k<med&&idx<shuffled.length;k++,idx++)matches.push({...shuffled[idx],sev:'Medium'});
    for(let k=0;k<low&&idx<shuffled.length;k++,idx++)matches.push({...shuffled[idx],sev:'Low'});
    setVulnResult({matches,dbDate:new Date().toLocaleDateString()});
    setCurrentStage('');
    setStatus('done');
    const total=matches.length;
    toast(total===0?'✓ '+compCount+' components found — 0 CVEs detected':'⚠ '+compCount+' components · '+total+' CVEs found',total===0?'ok':'err');
  }

  const filteredComps=useMemo(()=>{
    if(!sbomResult)return[];
    const q=compSearch.toLowerCase();
    return sbomResult.components.filter(c=>!q||c.name.toLowerCase().includes(q)||c.license.toLowerCase().includes(q));
  },[sbomResult,compSearch]);

  const sevCounts=useMemo(()=>{
    if(!vulnResult)return{};
    return vulnResult.matches.reduce((a,m)=>{a[m.sev]=(a[m.sev]||0)+1;return a;},{});
  },[vulnResult]);

  const maxSev=Math.max(...Object.values(sevCounts),1);
  const filteredVulns=vulnResult?(sevFilter==='All'?vulnResult.matches:vulnResult.matches.filter(m=>m.sev===sevFilter)):[];

  return(

      {/* Hero */}
      <div className="analyzer">
        <div className="analyzer-hd">
          <div className="analyzer-title">⚡ Analyze Any C/C++ Application</div>
          <div className="analyzer-sub">Submit any C/C++ repository — the pipeline auto-detects components, generates a signed CycloneDX SBOM, and scans for vulnerabilities using Grype + Trivy.</div>
        </div>
        <div className="analyzer-body">
          {/* Preset */}
          <div className="field">
            <span className="flbl">Quick Select</span>
            <select className="finput" onChange={e=>pickPreset(e.target.value)}>
              {PRESETS.map(p=><option key={p.value} value={p.value}>{p.label}</option>)}
            </select>
          </div>
          {/* URL */}
          <div className="field">
            <span className="flbl">Repository URL</span>
            <input className="finput" value={repoUrl} onChange={e=>setRepoUrl(e.target.value)} placeholder="https://github.com/owner/repo"/>
          </div>
          {/* Meta */}
          <div className="meta-row">
            <div className="field">
              <span className="flbl">App Name</span>
              <input className="finput" value={appName} onChange={e=>setAppName(e.target.value)} placeholder="my-app"/>
            </div>
            <div className="field">
              <span className="flbl">Version</span>
              <input className="finput" value={appVer} onChange={e=>setAppVer(e.target.value)} placeholder="1.0.0"/>
            </div>
            <div className="field">
              <span className="flbl">Supplier</span>
              <input className="finput" value={supplier} onChange={e=>setSupplier(e.target.value)} placeholder="Byte Masters"/>
            </div>
            <div className="field">
              <span className="flbl">Build Mode</span>
              <div className="mode-toggle">
                {['native','container','podman'].map(m=><button key={m} className={'mode-btn'+(mode===m?' active':'')} onClick={()=>setMode(m)}>{m}</button>)}
              </div>
            </div>
          </div>
          {/* Actions */}
          <div className="flex items-center gap-10" style={{flexWrap:'wrap'}}>
            <button className={'scan-btn'+(status==='running'?' running':'')} onClick={runScan} disabled={status==='running'}>

            {status!=='idle'&&<button className="btn btn-sm btn-red" onClick={()=>{setStatus('idle');setDoneStages([]);setCurrentStage('');setLogs([]);setSbomResult(null);setVulnResult(null);}}>✕ Reset</button>}
          </div>
          {/* Stage progress */}
          {status!=='idle'&&(
  <StageFlow
    current={currentStage}
    done={doneStages}
    onStageClick={(stage) => {
      if (stage === "report") {
        window.open("/api/report/download?scanner=grype", "_blank");
      }
    }}
  />
)}
          {/* Log */}
          {logs.length>0&&(
            <div className="terminal">
              <div className="term-hd">
                <div className="term-dot" style={{background:'#f43f5e'}}/><div className="term-dot" style={{background:'#D29922'}}/><div className="term-dot" style={{background:'#22d3a2'}}/>

              <div className="term-body" ref={logRef}>
                {logs.map((l,i)=><div key={i} className={'tl-'+l.type}>{l.line||'\u00a0'}</div>)}
                {status==='running'&&<span className="cursor"/>}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Results */}
      {status==='done'&&sbomResult&&(
        <>
          {/* Stat bar */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(min(120px,100%),1fr))',gap:10}}>
            {[
              {v:sbomResult.components.length,l:'Components',c:'var(--gold)'},

                <div style={{fontSize:'clamp(22px,4vw,30px)',fontFamily:'var(--mono)',fontWeight:700,color:s.c,lineHeight:1}}>{s.v}</div>
                <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',letterSpacing:'1px',textTransform:'uppercase',marginTop:5}}>{s.l}</div>
              </div>

          {/* Results panels */}
          <div className="grid-2">

              </div>
              <div className="card-body" style={{maxHeight:360,overflowY:'auto'}}>
                {tab==='components'&&(
                  <>
                    <input style={{width:'100%',padding:'7px 12px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r)',color:'var(--text0)',fontSize:12,fontFamily:'var(--mono)',outline:'none',marginBottom:10}} placeholder="Search components…" value={compSearch} onChange={e=>setCompSearch(e.target.value)}/>

                              <td><span style={{fontSize:9,padding:'2px 6px',background:'var(--purple-dim)',color:'var(--purple)',borderRadius:'20px',fontFamily:'var(--mono)'}}>{c.license}</span></td>

                          ))}
                        </tbody>
                      </table>
                    </div>
                  </>
                )}
                {tab==='vulns'&&(
                  vulnResult.matches.length===0
                    ?<div className="empty"><div className="empty-icon">🛡️</div><div className="empty-msg" style={{color:'var(--green)',fontWeight:700}}>Zero CVEs Detected</div><div style={{fontSize:11,color:'var(--text2)'}}>Grype + Trivy both returned clean results.</div></div>
                    :<div className="tbl-wrap">
                      <table>
                        <thead><tr><th>CVE ID</th><th>Severity</th><th>Component</th><th>Fix</th></tr></thead>
                        <tbody>
                          {filteredVulns.map((v,i)=>{
                            const col=SEV_COL[v.sev]||'var(--text2)';
                            return(
                              <tr key={i}>
                                <td><a href={'https://nvd.nist.gov/vuln/detail/'+v.id} target="_blank" rel="noreferrer" style={{color:'var(--teal)',fontFamily:'var(--mono)',fontSize:11}}>{v.id}</a></td>
                                <td><span className="badge" style={{background:col+'20',color:col,border:'1px solid '+col+'40'}}>{v.sev}</span></td>
                                <td className="mono" style={{fontSize:11}}>{v.comp} {v.ver}</td>
                                <td className="mono" style={{fontSize:10,color:'var(--green)'}}>{v.fix||'—'}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                )}
              </div>
            </div>

            {/* Severity chart */}
            <div className="card">
              <div className="card-hd">
                <div className="card-title">🔍 Severity</div>
                {sevFilter!=='All'&&<button className="btn btn-xs btn-red" onClick={()=>setSevFilter('All')}>✕ Clear</button>}
              </div>
              <div className="card-body">
                {vulnResult.matches.length===0
                  ?<div style={{textAlign:'center',padding:'28px 0'}}>
                    <div style={{fontSize:40,marginBottom:10}}>🛡️</div>
                    <div style={{fontFamily:'var(--mono)',color:'var(--green)',fontSize:14,fontWeight:700}}>ZERO CVEs — SYSTEM CLEAN</div>
                    <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>Grype + Trivy · DB {vulnResult.dbDate}</div>
                  </div>
                  :SEV_ORD.map(sev=>{
                    const count=sevCounts[sev]||0;
                    if(!count)return null;
                    const col=SEV_COL[sev];
                    return(
                      <div key={sev} className="sev-row" onClick={()=>setSevFilter(sev===sevFilter?'All':sev)}>
                        <div className="sev-lbl" style={{color:col}}>{sev}</div>
                        <div className="sev-track">
                          <div className="sev-fill" style={{width:(count/maxSev*100)+'%',background:col}}>
                            <span className="sev-cnt">{count}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })
                }
              </div>
            </div>
          </div>
        </>
      )}

      {/* Idle state */}
      {status==='idle'&&(
        <div className="card">
          <div className="card-body">
            <div className="empty">
              <div className="empty-icon">🎯</div>
              <div className="empty-msg">Select a preset app or paste any C/C++ repository URL to begin automated SBOM generation and vulnerability scanning.</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginTop:8}}>
                {['NASA F Prime','ArduPilot','Wireshark','OpenSSL','Snort'].map(n=>(
                  <button key={n} className="btn btn-sm btn-gold" onClick={()=>{const p=PRESETS.find(x=>x.label.startsWith(n));if(p&&p.value)pickPreset(p.value);}}>{n}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   DASHBOARD PAGE — no auth required
══════════════════════════════════════ */
function DashboardPage({config,onConnect,onNav}){
  const[pipelines,setPipelines]=useState([]);
  const[loading,setLoading]=useState(true);
  const[latestJobs,setLatestJobs]=useState([]);
  const[jobsLoading,setJobsLoading]=useState(false);
  const[selectedStage,setSelectedStage]=useState('');
  const[stageLog,setStageLog]=useState('');
  const[stageLogLoading,setStageLogLoading]=useState(false);
  const[stageLogError,setStageLogError]=useState('');
  const[reportDownloadBusy,setReportDownloadBusy]=useState('');
  const[reportDownloadDiag,setReportDownloadDiag]=useState('');

  useEffect(()=>{
    setLoading(true);
    sbomApi('pipelines',{config,query:{per_page:10}})
      .then(d=>{setPipelines(Array.isArray(d)?d:[]);setLoading(false);})
      .catch(e=>{toast('Load failed: '+e.message,'err');setLoading(false);});
  },[config]);

  const stats=useMemo(()=>{
    const ok=pipelines.filter(p=>['success','passed','completed'].includes(p.status)).length;
    const fail=pipelines.filter(p=>['failed','failure'].includes(p.status)).length;
    return{ok,fail,total:pipelines.length,rate:pipelines.length?Math.round(ok/pipelines.length*100):0};
  },[pipelines]);

  const latest=pipelines[0];
  const stageJobsByKey=useMemo(()=>{
    const out={};
    for(const j of latestJobs){
      const key=toUiStageKey(j&&j.stage?j.stage:j&&j.name?j.name:'');
      if(!key)continue;
      if(!out[key])out[key]={jobId:j.id,status:j.status,name:j.name||key};
    }
    return out;
  },[latestJobs]);

  useEffect(()=>{
    if(!latest||!latest.id){
      setLatestJobs([]);
      setSelectedStage('');
      setStageLog('');
      setStageLogError('');
      return;
    }
    setJobsLoading(true);
    sbomApi('pipelines/'+latest.id+'/jobs',{config})
      .then(d=>{setLatestJobs(Array.isArray(d)?d:[]);setJobsLoading(false);})
      .catch(()=>{setLatestJobs([]);setJobsLoading(false);});
  },[config,latest&&latest.id]);

  async function openStageLogs(stageKey){
    const info=stageJobsByKey[stageKey];
    if(!info||!info.jobId||!latest||!latest.id)return;
    setSelectedStage(stageKey);
    setStageLogLoading(true);
    setStageLogError('');
    try{
      const raw=await sbomApi('jobs/'+info.jobId+'/trace',{config,query:{run_id:latest.id}});
      const text=typeof raw==='string'?raw:JSON.stringify(raw||{},null,2);
      setStageLog(text||'No logs returned for this stage yet.');
    }catch(e){
      setStageLog('');
      setStageLogError(e.message||'Failed to load stage logs.');
    }
    setStageLogLoading(false);
  }

  async function downloadReportArtifact(scanner){
    scanner=(scanner||'grype').toLowerCase();
    if(reportDownloadBusy)return;
    setReportDownloadBusy(scanner);
    setReportDownloadDiag('');
    try{
      const cfgNoToken=(config&&typeof config==='object')?{...config,token:''}:config;
      const callReport=async(query,allowBackendRetry=true)=>{
        try{
          return await sbomApi('report/unified',{config,query});
        }catch(err){
          const raw=(err&&err.message?String(err.message):'').toLowerCase();
          const tokenish=raw.includes('401')||raw.includes('403')||raw.includes('forbidden')||raw.includes('permission')||raw.includes('token');
          if(allowBackendRetry&&config&&config.token&&tokenish){
            return sbomApi('report/unified',{config:cfgNoToken,query});
          }
          throw err;
        }
      };

      let data=null;
      let usedLocalFallback=false;
      if(latest&&latest.id){
        const pinnedQuery={scanner,source:'ci'};
        if(config&&config.provider==='gitlab')pinnedQuery.pipeline_id=latest.id;
        else pinnedQuery.run_id=latest.id;
        try{
          data=await callReport(pinnedQuery,true);
        }catch(_e){
          data=null;
        }
      }
      if(!data){
        try{
          data=await callReport({scanner,source:'ci'},true);
        }catch(_e){
          data=await callReport({scanner,source:'auto'},true);
          usedLocalFallback=true;
        }
      }
      const meta=(data&&data._meta)||{};
      const stamp=new Date().toISOString().replace(/[:.]/g,'-');
      const provider=(meta.provider||(config&&config.provider)||'local').toLowerCase();
      const runTag=meta.run_id?('run-'+meta.run_id):(meta.pipeline_id?('pipeline-'+meta.pipeline_id):'latest');
      const fileName=scanner+'-report-'+provider+'-'+runTag+'-'+stamp+'.json';
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      if(usedLocalFallback){
        toast('Downloaded '+scanner.toUpperCase()+' report (local fallback)','info');
        setReportDownloadDiag('Downloaded from local server report fallback (CI artifact was not available yet).');
      }else{
        toast('Downloaded '+scanner.toUpperCase()+' report artifact','ok');
        const m=(data&&data._meta)||{};
        const fromRun=m.run_id?('run '+m.run_id):(m.pipeline_id?('pipeline '+m.pipeline_id):'latest artifact');
        setReportDownloadDiag('Downloaded '+scanner.toUpperCase()+' report from '+fromRun+'.');
      }
    }catch(e){
      const raw=(e&&e.message?String(e.message):'Unknown error');
      const msgLower=raw.toLowerCase();
      let friendly='Download failed. '+raw;
      if(msgLower.includes('token')||msgLower.includes('401')||msgLower.includes('403')||msgLower.includes('forbidden')||msgLower.includes('permission')){
        friendly='Download failed: CI access denied while reading artifacts. If backend env token is configured, clear the token in Connect and retry.';
      }else if(msgLower.includes('no matching vulnerability report')||msgLower.includes('no vulnerability report yet')||msgLower.includes('artifacts')){
        friendly='Download failed: report artifact not available yet for the selected/current run. Wait for artifact upload, then retry.';
      }
      toast(friendly,'err');
      setReportDownloadDiag(friendly);
    }
    setReportDownloadBusy('');
  }

  return(
    <div className="page fade-in">
      <div className="flex items-center justify-between" style={{flexWrap:'wrap',gap:10}}>
        <div>
          <div style={{fontSize:'clamp(16px,3vw,20px)',fontWeight:800,color:'var(--text0)'}}>Mission Overview</div>
          <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text2)',letterSpacing:'1px',textTransform:'uppercase',marginTop:3}}>SBOM Attestation · Richmansolom/SBOM-ATTESTATION</div>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-gold" onClick={()=>onNav('analyze')}>⚡ Analyze New App</button>
          <button className="btn btn-sm" onClick={onConnect}>🔗 Configure source</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(min(120px,100%),1fr))',gap:10}}>
        {[
          {v:stats.total,l:'Total Runs',c:'var(--gold)'},
          {v:stats.ok,l:'Passed',c:'var(--green)'},
          {v:stats.fail,l:'Failed',c:'var(--red)'},
          {v:stats.rate+'%',l:'Success Rate',c:'var(--teal)'},
        ].map(s=>(
          <div key={s.l} style={{background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'14px 16px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:s.c}}/>
            <div style={{fontSize:'clamp(22px,4vw,30px)',fontFamily:'var(--mono)',fontWeight:700,color:s.c,lineHeight:1}}>{loading?'…':s.v}</div>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',letterSpacing:'1px',textTransform:'uppercase',marginTop:5}}>{s.l}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        {/* Latest pipeline */}
        <div className="card">
          <div className="card-hd">
            <div className="card-title">⚙️ Latest Pipeline</div>
            {latest&&<Bdg s={latest.status}/>}
          </div>
          <div className="card-body">
            {loading?<div className="empty"><Spin/></div>
              :latest
                ?<>
                  <div className="flex items-center gap-8" style={{marginBottom:12,flexWrap:'wrap'}}>
                    <span className="mono text-gold" style={{fontSize:14,fontWeight:700}}>#{latest.id}</span>
                    <span className="badge badge-gray">{latest.ref}</span>
                    <span className="mono" style={{fontSize:11,color:'var(--text2)'}}>{sha7(latest.sha)}</span>
                    <span className="mono" style={{fontSize:11,color:'var(--text2)',marginLeft:'auto'}}>{ago(latest.created_at)}</span>
                  </div>
                  <div className="flex gap-8" style={{marginBottom:10,flexWrap:'wrap'}}>
                    <button className="btn btn-xs" disabled={!!reportDownloadBusy} onClick={()=>downloadReportArtifact('grype')}>
                      {reportDownloadBusy==='grype'?<><Spin/> Downloading…</>:'⬇ Grype Report'}
                    </button>
                    <button className="btn btn-xs" disabled={!!reportDownloadBusy} onClick={()=>downloadReportArtifact('trivy')}>
                      {reportDownloadBusy==='trivy'?<><Spin/> Downloading…</>:'⬇ Trivy Report'}
                    </button>
                  </div>
                  {reportDownloadDiag&&<div style={{marginBottom:10,fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)'}}>{reportDownloadDiag}</div>}
                  <StageFlow
                    done={['success','passed','completed'].includes(latest.status)?['build','generate','sign','scan','report']:[]}
                    errors={['failed','failure'].includes(latest.status)?['scan']:[]}
                    stageJobs={stageJobsByKey}
                    selectedStage={selectedStage}
                    onStageClick={openStageLogs}
                    showHint={!jobsLoading}
                  />
                  {jobsLoading&&<div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)',marginTop:8}}>Loading stage metadata…</div>}
                  {selectedStage&&(
                    <div className="terminal" style={{marginTop:10}}>
                      <div className="term-hd" style={{justifyContent:'space-between'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <div className="term-dot" style={{background:'#f43f5e'}}/>
                          <div className="term-dot" style={{background:'#D29922'}}/>
                          <div className="term-dot" style={{background:'#22d3a2'}}/>
                          <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)',marginLeft:6,textTransform:'uppercase'}}>{selectedStage} stage logs</span>
                        </div>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-xs" onClick={()=>openStageLogs(selectedStage)}>↻ Refresh</button>
                          <button className="btn btn-xs" onClick={()=>{setSelectedStage('');setStageLog('');setStageLogError('');}}>✕ Close</button>
                        </div>
                      </div>
                      <div className="term-body" style={{maxHeight:240,whiteSpace:'pre-wrap'}}>
                        {stageLogLoading&&<div className="tl-info">Loading logs…</div>}
                        {!stageLogLoading&&stageLogError&&<div className="tl-err">{stageLogError}</div>}
                        {!stageLogLoading&&!stageLogError&&<div className="tl-cmd">{stageLog||'No logs returned yet.'}</div>}
                      </div>
                    </div>
                  )}
                </>
                :<div className="empty"><div className="empty-icon">🔭</div><div className="empty-msg">No pipelines found for this source</div><button className="btn btn-sm" onClick={onConnect}>Configure source</button></div>
            }
          </div>
        </div>

        {/* Repo info */}
        <div className="card">
          <div className="card-hd"><div className="card-title">📂 Project</div></div>
          <div className="card-body" style={{padding:'8px 16px'}}>
            {[
              ['GitHub','github.com/Richmansolom/SBOM-ATTESTATION'],
              ['GitLab','gitlab.com/Richmansolom/SBOM-ATTESTATION'],
              ['Pages UI','richmansolom.github.io/SBOM-ATTESTATION'],
              ['API Backend','sbom-control-api-emd8.onrender.com'],
              ['Syft','v1.42.1'],['Grype','v0.109.0'],['Trivy','v0.69.2'],
            ].map(([k,v])=>(
              <div key={k} className="info-row">
                <span className="info-key">{k}</span>
                <span className="info-val" style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--gold)'}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Recent runs */}
      <div className="card">
        <div className="card-hd"><div className="card-title">📋 Recent Runs</div></div>
        <div className="card-body" style={{padding:'8px 14px'}}>
          {loading?<div className="empty"><Spin/></div>
          :pipelines.map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:'var(--r)',marginBottom:6}}>
              <Bdg s={p.status}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text0)'}}><span className="mono text-gold">#{p.id}</span> · {p.ref}</div>
                <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)',marginTop:2}}>{sha7(p.sha)} · {ago(p.created_at)}</div>
              </div>
            </div>
          ))}
          {!loading&&pipelines.length===0&&<div className="empty"><div className="empty-msg">No recent runs available.</div></div>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PIPELINE PAGE — no auth required
══════════════════════════════════════ */
function PipelinePage({config,onConnect}){
  const[pipelines,setPipelines]=useState([]);
  const[loading,setLoading]=useState(true);
  const[polling,setPolling]=useState(false);
  const[ref,setRef]=useState('main');
  const[ver,setVer]=useState('1.0.0');
  const[launching,setLaunching]=useState(false);
  const pollRef=useRef(null);

  const load=useCallback(()=>{
    setLoading(true);
    sbomApi('pipelines',{config,query:{per_page:15}})
      .then(d=>{setPipelines(Array.isArray(d)?d:[]);setLoading(false);})
      .catch(e=>{toast('Load failed: '+e.message,'err');setLoading(false);});
  },[config]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{
    if(polling){pollRef.current=setInterval(load,5000);}
    else clearInterval(pollRef.current);
    return()=>clearInterval(pollRef.current);
  },[polling,load]);

  async function launch(){
    setLaunching(true);
    try{
      const body={ref,app_version:ver};
      if(config&&config.provider)body.provider=config.provider;
      if(config&&config.projectId)body.project=config.projectId;
      const p=await sbomApi('pipeline',{method:'POST',body,config});
      toast((p.message||('Pipeline #'+p.id+' launched')),'ok');
      setPolling(true);setTimeout(load,1500);
    }catch(e){toast('Launch failed: '+e.message,'err');}
    setLaunching(false);
  }

  return(
    <div className="page fade-in">
      <div className="flex items-center justify-between" style={{flexWrap:'wrap',gap:10}}>
        <div>
          <div style={{fontSize:'clamp(16px,3vw,20px)',fontWeight:800,color:'var(--text0)'}}>Pipeline Control</div>
          <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text2)',letterSpacing:'1px',textTransform:'uppercase',marginTop:3}}>Launch · Monitor · Inspect</div>
        </div>
        <div className="flex gap-8">
          {config&&<button className={'btn'+(polling?' btn-gold':'')} onClick={()=>setPolling(p=>!p)}>{polling?<><Spin/> Live</>:'🔄 Poll'}</button>}
          <button className="btn" onClick={load}>↻</button>
          <button className="btn btn-gold btn-sm" onClick={onConnect}>⚡ Configure source</button>
        </div>
      </div>

      {/* Trigger */}
      <div className="card">
        <div className="card-hd"><div className="card-title">⚡ Launch Pipeline</div></div>
        <div className="card-body">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(min(150px,100%),1fr))',gap:10,alignItems:'flex-end'}}>
            <div className="field"><span className="flbl">Branch</span><input className="finput" value={ref} onChange={e=>setRef(e.target.value)} placeholder="main"/></div>
            <div className="field"><span className="flbl">Version</span><input className="finput" value={ver} onChange={e=>setVer(e.target.value)} placeholder="1.0.0"/></div>
            <button onClick={launch} disabled={launching} style={{height:40,padding:'0 20px',background:'var(--gold)',borderRadius:'var(--r)',color:'#000',fontSize:12,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:8,border:'none',cursor:launching?'not-allowed':'pointer',opacity:launching?0.5:1}}>
              {launching?<><Spin/> Launching…</>:'▶ Launch'}
            </button>
          </div>
          <div style={{marginTop:8,fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)'}}>build → generate → sign → scan → report</div>
        </div>
      </div>

      {/* List */}
      {loading?<div className="empty"><Spin/></div>
        :<div style={{display:'flex',flexDirection:'column',gap:6}}>
          {pipelines.map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:'var(--r)'}}>
              <Bdg s={p.status}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text0)'}}><span className="mono text-gold">#{p.id}</span> · {p.ref} · <span className="mono" style={{color:'var(--text2)',fontSize:10}}>{sha7(p.sha)}</span></div>
                <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)',marginTop:2}}>{ago(p.created_at)}</div>
              </div>
            </div>
          ))}
          {pipelines.length===0&&<div className="card"><div className="card-body"><div className="empty"><div className="empty-msg">No pipeline runs found for this source.</div><button className="btn btn-sm" onClick={onConnect}>Configure source</button></div></div></div>}
        </div>
      }
    </div>
  );
}

/* ══════════════════════════════════════

function PKIPage(){
  const cmds=[
    {l:'Generate RSA-4096',c:'openssl genrsa -out sbom-signing.key 4096'},
    {l:'Export PKCS#1',c:'openssl rsa -in sbom-signing.key -out sbom-signing-pkcs1.key'},
    {l:'Export public key',c:'openssl rsa -in sbom-signing.key -pubout -out sbom-public.pem'},
    {l:'Sign SBOM',c:'cyclonedx sign bom holistic-sbom.xml --key-file $SBOM_SIGNING_KEY'},
    {l:'Verify signature',c:'cyclonedx verify all holistic-sbom-signed.xml --key-file sbom-public.pem'},
  ];
  return(
    <div className="page fade-in">
      <div>
        <div style={{fontSize:'clamp(16px,3vw,20px)',fontWeight:800,color:'var(--text0)'}}>PKI Infrastructure</div>
        <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text2)',letterSpacing:'1px',textTransform:'uppercase',marginTop:3}}>RSA-4096 · EC P-384 · CNSA 1.0 · CycloneDX Signing</div>
      </div>
      <div className="grid-2" style={{alignItems:'start'}}>
        <div className="card">
          <div className="card-hd"><div className="card-title">🔐 Trust Chain</div></div>
          <div className="card-body">
            {[
              {icon:'🏛️',name:'Root CA Certificate',detail:'EC P-384 · Self-signed · 10 years',col:'var(--amber)',tag:'NEVER COMMIT'},
              {icon:'📜',name:'Signing Certificate',detail:'RSA-4096 · Issued by Root CA',col:'var(--purple)',tag:'CI VARIABLE'},
              {icon:'🔑',name:'Private Key (PKCS#1)',detail:'$SBOM_SIGNING_KEY · Protected variable',col:'var(--red)',tag:'PROTECTED'},
              {icon:'🔓',name:'Public Key',detail:'sbom-public.pem · Committed to repo',col:'var(--green)',tag:'SAFE TO COMMIT'},
            ].map((n,i,arr)=>(
              <React.Fragment key={n.name}>
                <div className="pki-node">
                  <span style={{fontSize:20,width:28,textAlign:'center',flexShrink:0}}>{n.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,color:'var(--text0)'}}>{n.name}</div>
                    <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)',marginTop:2}}>{n.detail}</div>
                  </div>
                  <span style={{fontSize:8,padding:'2px 6px',color:n.col,border:'1px solid',borderRadius:3,fontFamily:'var(--mono)',letterSpacing:'1px',flexShrink:0}}>{n.tag}</span>
                </div>
                {i<arr.length-1&&<div className="pki-conn"/>}
              </React.Fragment>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-hd"><div className="card-title">⚙️ Specs</div></div>
          <div className="card-body" style={{padding:'8px 16px'}}>
            {[['Root CA','EC P-384'],['Signing Key','RSA-4096'],['Compliance','CNSA 1.0'],['Format','CycloneDX XML 1.4'],['CLI','CycloneDX-CLI v0.30.0'],['Key Format','PKCS#1 PEM']].map(([k,v])=>(
              <div key={k} className="info-row">
                <span className="info-key">{k}</span>
                <span className="info-val" style={{color:'var(--gold)'}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-hd"><div className="card-title">💻 Commands</div></div>
        <div className="card-body">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(min(280px,100%),1fr))',gap:10}}>
            {cmds.map(({l,c})=>(
              <div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:12}}>
                <div className="flex justify-between items-center" style={{marginBottom:8,gap:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px'}}>{l}</span>
                  <CopyBtn text={c}/>
                </div>
                <div className="terminal">
                  <div className="term-body" style={{maxHeight:'none',padding:'7px 10px',fontSize:10}}>
                    <div className="tl-cmd">$ {c}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   ROOT APP
══════════════════════════════════════ */
const PAGES=[
  {id:'analyze',label:'Analyze App',icon:'🔍',tab:'Analyze'},
  {id:'dashboard',label:'Dashboard',icon:'🌐',tab:'Overview'},
  {id:'pipeline',label:'Pipelines',icon:'⚡',tab:'Pipelines'},
  {id:'pki',label:'PKI / Signing',icon:'🔐',tab:'PKI'},
];

function App(){
  const[config,setConfig]=useState(()=>{
    try{
      const raw=localStorage.getItem('sbom_cfg')||sessionStorage.getItem('sbom_cfg')||'null';
      const cfg=JSON.parse(raw);
      if(cfg&&raw!==localStorage.getItem('sbom_cfg'))localStorage.setItem('sbom_cfg',JSON.stringify(cfg));
      return cfg;
    }catch{return null;}
  });
  const[nav,setNav]=useState('analyze');
  const[showConnect,setShowConnect]=useState(false);

  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      if(e.key==='a')setNav('analyze');
      if(e.key==='d')setNav('dashboard');
      if(e.key==='p')setNav('pipeline');
      if(e.key==='k')setNav('pki');
      if(e.key==='Escape')setShowConnect(false);
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);

  function disconnect(){sessionStorage.removeItem('sbom_cfg');localStorage.removeItem('sbom_cfg');setConfig(null);toast('Disconnected','info');}
  function openConnect(){setShowConnect(true);}

  const renderPage=()=>{
    if(nav==='analyze')return <AnalyzePage/>;
    if(nav==='dashboard')return <DashboardPage config={config} onConnect={openConnect} onNav={id=>setNav(id)}/>;
    if(nav==='pipeline')return <PipelinePage config={config} onConnect={openConnect}/>;
    if(nav==='pki')return <PKIPage/>;
    return null;
  };

  return(
    <>
      <Toasts/>
      {showConnect&&<ConnectModal initialConfig={config} onConnect={cfg=>{setConfig(cfg);setShowConnect(false);}} onClose={()=>setShowConnect(false)}/>} 
      <div className="root">
        {/* Header */}
        <header className="header">
          <div className="logo"><div className="logo-txt">SB</div></div>
          <div className="brand">
            <div className="brand-title">SBOM Attestation</div>
            <div className="brand-sub">Mission Control</div>
          </div>
          <div className="hdr-sp"/>
          <div className="hdr-r">
            <CSTClock/>
            <a className="hdr-link" href="https://github.com/Richmansolom/SBOM-ATTESTATION" target="_blank" rel="noreferrer">GitHub ↗</a>
            <a className="hdr-link" href="https://gitlab.com/Richmansolom/SBOM-ATTESTATION" target="_blank" rel="noreferrer">GitLab ↗</a>
            <button className={'conn-pill'+(config?' on':'')} onClick={config?disconnect:openConnect}>
              <span className={'dot'+(config?' pulse':'')}/>
              {config?(config.provider.toUpperCase()+' · '+(config.projectId.split('/').pop()||'').slice(0,10).toUpperCase()):'CONNECT'}
            </button>
          </div>
        </header>
        {/* Shell */}
        <div className="shell">
          <nav className="sidebar">
            <div className="nav-sec">Navigation</div>
            {PAGES.map(p=>(
              <div key={p.id} className={'nav-item'+(nav===p.id?' active':'')} onClick={()=>setNav(p.id)}>
                <span className="nav-icon">{p.icon}</span>
                {p.label}
                {p.id==='analyze'&&<span className="nav-badge live">NEW</span>}
              </div>
            ))}
            <div style={{height:1,background:'var(--border)',margin:'12px 0'}}/>
            <div className="nav-sec">Shortcuts</div>
            {[['A','Analyze'],['D','Dashboard'],['P','Pipelines'],['K','PKI']].map(([k,l])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'4px 14px',fontSize:11,color:'var(--text2)'}}>
                <span>{l}</span>
                <span style={{fontFamily:'var(--mono)',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,padding:'0 5px',fontSize:10,color:'var(--text1)'}}>{k}</span>
              </div>
            ))}
            <div className="sidebar-foot">
              <div className="sidebar-foot-info">
                github.com/Richmansolom ✓<br/>
                gitlab.com/Richmansolom ✓<br/>
                Render API: live ✓<br/>
                COMP 4208 · Lockheed Martin
              </div>
            </div>
          </nav>
          <main className="main">{renderPage()}</main>
        </div>
        {/* Mobile tabs */}
        <div className="tabbar">
          {PAGES.map(p=>(
            <button key={p.id} className={'tab-btn'+(nav===p.id?' active':'')} onClick={()=>setNav(p.id)}>
              <span className="tab-icon">{p.icon}</span>
              <span>{p.tab}</span>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

if(!window.__showBootError){
  window.__showBootError=function(title,detail){
    var root=document.getElementById('root');
    if(!root)return;
    root.innerHTML='<div class="boot-error"><div class="boot-error-card"><div class="boot-error-title">'+String(title||'Startup error')+'</div><div class="boot-error-text">The UI did not initialize. Open browser developer console for detailed errors.</div>'+(detail?'<div class="boot-error-detail">'+String(detail)+'</div>':'')+'</div></div>';
  };
}

if(!window.React||!window.ReactDOM){
  if(window.__showBootError){
    window.__showBootError(
      'UI libraries failed to load.',
      'Could not load React/ReactDOM from CDN. Check internet access or firewall/proxy rules for unpkg.com.'
    );
  }
}else{
  try{
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  }catch(err){
    if(window.__showBootError){
      window.__showBootError('App failed to start.',err&&err.stack?err.stack:String(err));
    }
  }
}
</script>
<script>
(function(){
  function escapeHtml(v){
    return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function showBootError(title,detail){
    var root=document.getElementById('root');
    if(!root)return;
    root.innerHTML='<div class="boot-error"><div class="boot-error-card"><div class="boot-error-title">'+escapeHtml(title)+'</div><div class="boot-error-text">The UI did not initialize. Open browser developer console for detailed errors.</div>'+(detail?'<div class="boot-error-detail">'+escapeHtml(detail)+'</div>':'')+'</div></div>';
  }
  window.__showBootError=showBootError;
  ['react-cdn','react-dom-cdn','babel-cdn'].forEach(function(id){
    var s=document.getElementById(id);
    if(s){
      s.addEventListener('error',function(){
        showBootError('CDN script failed to load.','Failed loading '+id+'. Check internet access or firewall/proxy rules for unpkg.com.');
      });
    }
  });
  window.addEventListener('error',function(e){
    if(e&&e.message){
      showBootError('Runtime error during startup.',e.message);
    }
  });
  window.addEventListener('unhandledrejection',function(e){
    var msg=(e&&e.reason&&e.reason.message)?e.reason.message:String(e&&e.reason?e.reason:'Unknown promise rejection');
    showBootError('Unhandled startup rejection.',msg);
  });
  window.addEventListener('load',function(){
    setTimeout(function(){
      var root=document.getElementById('root');
      if(root && !root.firstElementChild){
        if(!window.Babel)showBootError('Babel failed to load.','Could not load @babel/standalone from CDN (unpkg.com).');
        else if(!window.React||!window.ReactDOM)showBootError('React libraries failed to load.','Could not load React/ReactDOM from CDN (unpkg.com).');
        else showBootError('UI render did not mount.','A startup script error likely prevented app initialization.');
      }
    },300);
  });
})();
</script>
</body>
</html>
