name: SBOM Pipeline
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      app_path:
        description: "Select the test app to run"
        required: true
        type: choice
        options:
          - example-app
          - test-apps/app1
          - test-apps/app2
          - test-apps/app3
          - test-apps/app4
        default: example-app
      app_version:
        description: "Application version"
        required: false
        default: "1.0.0"

jobs:
  build_sbom_scan:
    runs-on: ubuntu-latest
    env:
      SBOM_DIR: sbom
      REPORT_DIR: reports
      BUILD_LOG: build-output.log
      # Point at your C/C++ project root (contains Makefile or your build; holds app-metadata.*).
      APP_DIR: ${{ github.event.inputs.app_path || 'example-app' }}
      # merge-sbom.ps1 accepts .json, .csv, or .xml — keep path in sync with APP_DIR when retargeting.
      APP_METADATA: ${{ github.event.inputs.app_path || 'example-app' }}/app-metadata.json
      APP_VERSION: ${{ github.event.inputs.app_version || '1.0.0' }}
      TRIVY_IMAGE: aquasec/trivy:0.69.3
      SBOM_PRIVATE_KEY_PEM: ${{ secrets.SBOM_PRIVATE_KEY_PEM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean stale SBOM and report outputs
        run: bash scripts/clean-sbom-outputs.sh "$SBOM_DIR" "$REPORT_DIR"

      - name: Prepare directories
        run: mkdir -p "$SBOM_DIR" "$REPORT_DIR" "$APP_DIR/build"

      - name: Build C++ application
        run: dir:/src/$APP_DIR 2>&1 | tee "$REPORT_DIR/$BUILD_LOG"

      - name: Generate COTS SBOMs (Syft + Trivy + Distro2SBOM)
        run: |
          docker pull anchore/syft:latest
          docker pull "$TRIVY_IMAGE"
          docker pull cyclonedx/cyclonedx-cli:latest
          docker pull python:3.12-slim

          docker run --rm -v "$GITHUB_WORKSPACE:/src" anchore/syft:latest dir:/src/$APP_DIR -o cyclonedx-json > "$SBOM_DIR/sbom-source-syft.json"
          docker run --rm -v "$GITHUB_WORKSPACE:/src" anchore/syft:latest dir:/src/$APP_DIR/build -o cyclonedx-json > "$SBOM_DIR/sbom-build-syft.json"

          docker run --rm -v "$GITHUB_WORKSPACE:/src" -v "$GITHUB_WORKSPACE:/work" "$TRIVY_IMAGE" filesystem --format cyclonedx --output "/work/$SBOM_DIR/sbom-source-trivy.json" /src/$APP_DIR
          docker run --rm -v "$GITHUB_WORKSPACE:/src" -v "$GITHUB_WORKSPACE:/work" "$TRIVY_IMAGE" filesystem --format cyclonedx --output "/work/$SBOM_DIR/sbom-build-trivy.json" /src/$APP_DIR/build

          docker run --rm -v "$GITHUB_WORKSPACE:/work" python:3.12-slim bash -lc "pip install --no-cache-dir distro2sbom >/dev/null && python -m distro2sbom.cli --distro auto --system --sbom cyclonedx --format json --product-type operating-system --product-name sbom-runtime --product-version 1.0 --output-file /work/$SBOM_DIR/sbom-distro2sbom.json"

          docker run --rm -v "$GITHUB_WORKSPACE:/data" cyclonedx/cyclonedx-cli:latest merge --input-files "/data/$SBOM_DIR/sbom-source-syft.json" "/data/$SBOM_DIR/sbom-source-trivy.json" "/data/$SBOM_DIR/sbom-distro2sbom.json" --output-file "/data/$SBOM_DIR/sbom-source.json" --output-format json
          docker run --rm -v "$GITHUB_WORKSPACE:/data" cyclonedx/cyclonedx-cli:latest merge --input-files "/data/$SBOM_DIR/sbom-build-syft.json" "/data/$SBOM_DIR/sbom-build-trivy.json" "/data/$SBOM_DIR/sbom-distro2sbom.json" --output-file "/data/$SBOM_DIR/sbom-build.json" --output-format json

      - name: Enrich SBOMs with custom metadata
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work mcr.microsoft.com/powershell:7.4-ubuntu-22.04 \
            pwsh -File merge-sbom.ps1 -InputSbom "$SBOM_DIR/sbom-source.json" -AppMetadata "$APP_METADATA" -OutputSbom "$SBOM_DIR/sbom-source.enriched.json"
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work mcr.microsoft.com/powershell:7.4-ubuntu-22.04 \
            pwsh -File merge-sbom.ps1 -InputSbom "$SBOM_DIR/sbom-build.json" -AppMetadata "$APP_METADATA" -OutputSbom "$SBOM_DIR/sbom-build.enriched.json"

      - name: Validate SBOM (CycloneDX + NTIA) - before signing
        run: |
          docker pull cyclonedx/cyclonedx-cli:latest
          docker pull hoppr/hopctl:latest
          set +e
          docker run --rm -v "$GITHUB_WORKSPACE:/data" cyclonedx/cyclonedx-cli:latest validate --input-file "/data/$SBOM_DIR/sbom-source.enriched.json"
          raw_validate=$?
          docker run --rm -v "$GITHUB_WORKSPACE:/data" cyclonedx/cyclonedx-cli:latest validate --input-file "/data/$SBOM_DIR/sbom-build.enriched.json"
          enriched_validate=$?

          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work mcr.microsoft.com/powershell:7.4-ubuntu-22.04 pwsh -File ./check-ntia.ps1 -SbomFile "$SBOM_DIR/sbom-source.enriched.json"
          ntia_local=$?

          docker run --rm -v "$GITHUB_WORKSPACE:/data" -w /data hoppr/hopctl validate sbom --sbom "$SBOM_DIR/sbom-source.enriched.json" --profile ntia --log "/data/$REPORT_DIR/hoppr-source.log" --output-file "/data/$REPORT_DIR/hoppr-source-results.json" --basic-term 2>&1 | tee "$REPORT_DIR/hoppr-source-console.txt"
          hoppr_source=$?
          docker run --rm -v "$GITHUB_WORKSPACE:/data" -w /data hoppr/hopctl validate sbom --sbom "$SBOM_DIR/sbom-build.enriched.json" --profile ntia --log "/data/$REPORT_DIR/hoppr-build.log" --output-file "/data/$REPORT_DIR/hoppr-build-results.json" --basic-term 2>&1 | tee "$REPORT_DIR/hoppr-build-console.txt"
          hoppr_build=$?
          set -e

          {
            echo "SBOM Requirements Summary"
            echo "========================="
            echo "CycloneDX validate (source):      $([ $raw_validate -eq 0 ] && echo PASS || echo FAIL)"
            echo "CycloneDX validate (build):      $([ $enriched_validate -eq 0 ] && echo PASS || echo FAIL)"
            echo "NTIA Minimum Elements (local):   $([ $ntia_local -eq 0 ] && echo PASS || echo FAIL)"
            echo "Hoppr NTIA (source):             $([ $hoppr_source -eq 0 ] && echo PASS || echo WARN)"
            echo "Hoppr NTIA (build):             $([ $hoppr_build -eq 0 ] && echo PASS || echo WARN)"
            echo ""
            echo "========== Hoppr Source Log (dependencies present/missing) =========="
            cat "$REPORT_DIR/hoppr-source.log" 2>/dev/null || echo "(no log file)"
            echo ""
            echo "========== Hoppr Build Log (dependencies present/missing) =========="
            cat "$REPORT_DIR/hoppr-build.log" 2>/dev/null || echo "(no log file)"
          } > "$REPORT_DIR/requirements-summary.txt"

          if [ $raw_validate -ne 0 ] || [ $enriched_validate -ne 0 ] || [ $ntia_local -ne 0 ]; then
            echo "SBOM requirement checks failed. See $REPORT_DIR/requirements-summary.txt"
            exit 1
          fi

      - name: Sign SBOMs with embedded CycloneDX signature (PKI, RS384, CNSA 2.0)
        run: |
          set -e
          chmod +x scripts/sign-sbom.sh
          PKI_DIR="$SBOM_DIR/pki"
          mkdir -p "$PKI_DIR"
          if [ -n "${SBOM_PRIVATE_KEY_PEM:-}" ]; then
            printf '%s\n' "$SBOM_PRIVATE_KEY_PEM" > "$PKI_DIR/sbom_private_key.pem"
            chmod 600 "$PKI_DIR/sbom_private_key.pem"
            openssl rsa -in "$PKI_DIR/sbom_private_key.pem" -pubout -out "$PKI_DIR/sbom_public_key.pem"
            echo "Using CI-provided signing key from SBOM_PRIVATE_KEY_PEM"
          fi
          cp "$SBOM_DIR/sbom-source.enriched.json" "$SBOM_DIR/sbom-source.enriched.unsigned.json"
          cp "$SBOM_DIR/sbom-build.enriched.json" "$SBOM_DIR/sbom-build.enriched.unsigned.json"
          docker run --rm -v "$GITHUB_WORKSPACE:/data" cyclonedx/cyclonedx-cli:latest convert --input-file "/data/$SBOM_DIR/sbom-source.enriched.json" --output-file "/data/$SBOM_DIR/sbom-build.enriched.unsigned.v16.json" --output-format json --output-version v1_6
          docker run --rm -v "$GITHUB_WORKSPACE:/data" cyclonedx/cyclonedx-cli:latest convert --input-file "/data/$SBOM_DIR/sbom-build.enriched.json" --output-file "/data/$SBOM_DIR/sbom-build.enriched.unsigned.v16.json" --output-format json --output-version v1_6
          bash scripts/sign-sbom.sh "$SBOM_DIR/sbom-source.enriched.json" "$SBOM_DIR/sbom-source.enriched.signed.json" "$PKI_DIR"
          mv "$SBOM_DIR/sbom-source.enriched.signed.json" "$SBOM_DIR/sbom-source.enriched.json"
          bash scripts/sign-sbom.sh "$SBOM_DIR/sbom-build.enriched.json" "$SBOM_DIR/sbom-build.enriched.signed.json" "$PKI_DIR"
          mv "$SBOM_DIR/sbom-build.enriched.signed.json" "$SBOM_DIR/sbom-build.enriched.json"
          echo "Signature embedded in SBOM - public key in $PKI_DIR/sbom_public_key.pem"

      - name: Grype + Trivy vulnerability scan (open CVE sources)
        run: |
          docker pull anchore/grype:latest
          mkdir -p "$RUNNER_TEMP/grype-db"
          for attempt in 1 2 3; do
            docker run --rm -e GRYPE_DB_CACHE_DIR=/grype-db -v "$RUNNER_TEMP/grype-db:/grype-db" anchore/grype:latest db update > "$REPORT_DIR/grype-db-update.txt" 2>&1 && break
            if [ "$attempt" -eq 3 ]; then
              echo "Grype DB update failed after retries:"
              cat "$REPORT_DIR/grype-db-update.txt"
              exit 1
            fi
            sleep $((attempt * 15))
          done
          for attempt in 1 2 3; do
            docker run --rm -e GRYPE_DB_CACHE_DIR=/grype-db -v "$RUNNER_TEMP/grype-db:/grype-db" anchore/grype:latest db status > "$REPORT_DIR/grype-db-status.txt" 2>&1 && break
            if [ "$attempt" -eq 3 ]; then
              echo "Grype DB status failed after retries:"
              cat "$REPORT_DIR/grype-db-status.txt"
              exit 1
            fi
            sleep $((attempt * 15))
          done
          docker run --rm -e GRYPE_DB_CACHE_DIR=/grype-db -v "$RUNNER_TEMP/grype-db:/grype-db" anchore/grype:latest db providers > "$REPORT_DIR/grype-db-providers.txt" 2>&1
          if grep -qi "current database is invalid" "$REPORT_DIR/grype-db-status.txt"; then
            echo "Grype DB freshness check failed:"
            cat "$REPORT_DIR/grype-db-status.txt"
            exit 1
          fi

          docker run --rm -e GRYPE_DB_CACHE_DIR=/grype-db -v "$GITHUB_WORKSPACE:/data" -v "$RUNNER_TEMP/grype-db:/grype-db" anchore/grype:latest sbom:/data/$SBOM_DIR/sbom-source.enriched.unsigned.v16.json -o json > "$REPORT_DIR/grype-report.json"
           docker run --rm -e GRYPE_DB_CACHE_DIR=/grype-db -v "$GITHUB_WORKSPACE:/data" -v "$RUNNER_TEMP/grype-db:/grype-db" anchore/grype:latest sbom:/data/$SBOM_DIR/sbom-source.enriched.unsigned.v16.json -o table > "$REPORT_DIR/grype-report.txt"
        
           docker run --rm -v "$GITHUB_WORKSPACE:/data" "$TRIVY_IMAGE" sbom --scanners vuln --vuln-severity-source nvd,ghsa,osv --format json --output "/data/$REPORT_DIR/trivy-sbom-report.json" "/data/$SBOM_DIR/sbom-source.enriched.unsigned.v16.json" || echo '{}' > "$REPORT_DIR/trivy-sbom-report.json"
           docker run --rm -v "$GITHUB_WORKSPACE:/data" "$TRIVY_IMAGE" sbom --scanners vuln --vuln-severity-source nvd,ghsa,osv --format table --output "/data/$REPORT_DIR/trivy-sbom-report.txt" "/data/$SBOM_DIR/sbom-source.enriched.unsigned.v16.json" || echo 'Trivy scan skipped due to SBOM compatibility issue' > "$REPORT_DIR/trivy-sbom-report.txt"
          

      - name: Generate vulnerability analysis report
        run: |
          trivy_total=$(jq '[.Results[]?.Vulnerabilities[]?] | length' "$REPORT_DIR/trivy-sbom-report.json")
          trivy_critical=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$REPORT_DIR/trivy-sbom-report.json")
          trivy_high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$REPORT_DIR/trivy-sbom-report.json")
          trivy_medium=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' "$REPORT_DIR/trivy-sbom-report.json")
          trivy_low=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' "$REPORT_DIR/trivy-sbom-report.json")

          jq -r '
            def count(sev): ( [ .matches[]? | select(.vulnerability.severity == sev) ] | length );
            "Vulnerability Analysis Summary",
            "==============================",
            ("Total: " + ( [ .matches[]? ] | length | tostring )),
            ("Critical: " + (count("Critical") | tostring)),
            ("High: " + (count("High") | tostring)),
            ("Medium: " + (count("Medium") | tostring)),
            ("Low: " + (count("Low") | tostring)),
            ("Negligible: " + (count("Negligible") | tostring)),
            "",
            "Top Findings (up to 10):",
            ( [ .matches[]? | "\(.vulnerability.id) | \(.vulnerability.severity) | \(.artifact.name) \(.artifact.version // "")" ][0:10] | .[] )
          ' "$REPORT_DIR/grype-report.json" > "$REPORT_DIR/vulnerability-analysis.txt"

          {
            echo ""
            echo "Secondary Scan (Trivy SBOM, NVD/GHSA/OSV sources)"
            echo "=================================================="
            echo "Total: $trivy_total"
            echo "Critical: $trivy_critical"
            echo "High: $trivy_high"
            echo "Medium: $trivy_medium"
            echo "Low: $trivy_low"
          } >> "$REPORT_DIR/vulnerability-analysis.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pipeline-artifacts
          path: |
            ${{ env.APP_DIR }}/build/
            sbom/
            reports/
            !sbom/pki/sbom_private_key.pem
          retention-days: 7
